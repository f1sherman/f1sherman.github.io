name: Codex PR Review

on:
  pull_request_target:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.base.sha || github.ref }}

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Review PR
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          mkdir -p tmp
          export HOME="$(mktemp -d "$PWD/tmp/codex-home.XXXXXX")"
          trap 'rm -rf "$HOME"' EXIT
          mkdir -p "$HOME/.codex"
          printf %s "$CODEX_AUTH_JSON" > "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"

          REVIEW_REPO="${GITHUB_REPOSITORY:-$(jq -r '.repository.full_name // empty' "$GITHUB_EVENT_PATH")}"
          REVIEW_PR_NUMBER="$(jq -r '.pull_request.number // .inputs.pr_number // empty' "$GITHUB_EVENT_PATH")"
          test -n "$REVIEW_REPO"
          test -n "$REVIEW_PR_NUMBER"

          ruby tools/codex-pr-review/ci_preflight.rb
          ruby bin/codex-pr-review \
            --platform github \
            --repo "$REVIEW_REPO" \
            --pr-number "$REVIEW_PR_NUMBER" \
            --output-dir tmp/codex-pr-review

      - name: Upload review artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: codex-pr-review
          path: tmp/codex-pr-review
          if-no-files-found: ignore
