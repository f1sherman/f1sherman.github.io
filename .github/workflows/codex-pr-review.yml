name: Codex PR Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to enqueue for review
        required: true
        type: string

jobs:
  enqueue:
    runs-on: ubuntu-latest
    steps:
      - name: Enqueue PR review
        run: |
          set -euo pipefail

          REVIEW_REPO="${GITHUB_REPOSITORY:-$(jq -r '.repository.full_name // empty' "$GITHUB_EVENT_PATH")}"
          REVIEW_PR_NUMBER="$(jq -r '.inputs.pr_number // empty' "$GITHUB_EVENT_PATH")"
          test -n "$REVIEW_REPO"
          test -n "$REVIEW_PR_NUMBER"
          export REVIEW_REPO REVIEW_PR_NUMBER

          curl -fsS -X POST https://codex-review.brianjohn.com/enqueue \
            -H 'Authorization: Bearer ${{ secrets.CODEX_REVIEWER_SERVICE_TOKEN }}' \
            -H 'Content-Type: application/json' \
            --data "$(jq -n '{
              "platform": "github",
              "repo": env.REVIEW_REPO,
              "pr_number": (env.REVIEW_PR_NUMBER | tonumber),
              "trigger": "manual"
            }')"
