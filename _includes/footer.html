<footer class="site-footer">
  <div class="wrapper site-footer__inner">
    <div class="site-footer__copy">
      <p class="site-footer__title">{{ site.title }}</p>
      <p class="site-footer__description">{{ site.description | split: '. ' | first }}.</p>
    </div>

    <ul class="site-footer__links">
      {% if site.github_username %}
        <li><a href="https://github.com/{{ site.github_username }}">GitHub</a></li>
      {% endif %}
      {% if site.linkedin_username %}
        <li><a href="https://www.linkedin.com/in/{{ site.linkedin_username }}">LinkedIn</a></li>
      {% endif %}
      {% if site.twitter_username %}
        <li><a href="https://twitter.com/{{ site.twitter_username }}">X</a></li>
      {% endif %}
      <li><a href="{{ '/feed.xml' | relative_url }}">RSS</a></li>
    </ul>
  </div>
</footer>
